<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Montessori-Begleiter — Kita-Verwaltung</title>
<style>
  :root{--sand:#F2EBE1;--sand2:#EAE0D2;--brown:#3B2F2A;--brown2:#6b5a4e;--green:#3d5e42;--green2:#7A8D7B;--terracotta:#C88A75;--err:#c0392b;--ok:#3d5e42}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--sand);color:var(--brown);padding:24px}
  .wrap{max-width:560px;margin:0 auto}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--brown2);font-size:13px;margin:0 0 24px}
  .card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--sand2)}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;background:var(--sand2);font-size:13px;font-weight:600;color:var(--brown2)}
  .tab.active{background:var(--green);color:#fff}
  .pane{display:none}.pane.active{display:block}
  label{display:block;font-size:12px;font-weight:600;margin:14px 0 4px;color:var(--brown2)}
  label:first-child{margin-top:0}
  input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--sand2);border-radius:8px;font-size:14px;font-family:inherit;background:var(--sand)}
  textarea{min-height:100px;resize:vertical}
  .hint{font-size:11.5px;color:var(--brown2);margin-top:3px}
  button{margin-top:16px;width:100%;padding:11px;border:none;border-radius:8px;background:var(--green);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  button.secondary{background:transparent;border:1px solid var(--green2);color:var(--green)}
  button.danger{background:transparent;border:1px solid var(--err);color:var(--err)}
  .result{margin-top:14px;padding:14px;border-radius:8px;font-size:13px;display:none}
  .result.ok{background:#e8f0e8;color:var(--ok);display:block}
  .result.err{background:#fbeaea;color:var(--err);display:block}
  .code-box{margin-top:14px;padding:14px;background:var(--sand2);border-radius:8px;font-size:13px;display:none}
  .stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--sand2);font-size:13px}
  .stat-row:last-child{border-bottom:none}
  .copy-btn{margin-top:8px;background:var(--terracotta)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Kita-Verwaltung</h1>
  <p class="sub">Internes Tool — nur für dich. Kitas und Eltern sehen diese Seite nicht.</p>

  <div class="tabs">
    <div class="tab active" id="tab-create" onclick="switchTab('create')">Neue Kita anlegen</div>
    <div class="tab" id="tab-manage" onclick="switchTab('manage')">Bestehende Kita</div>
  </div>

  <!-- CREATE -->
  <div class="pane active card" id="pane-create">
    <label>Name der Einrichtung</label>
    <input type="text" id="c-name" placeholder="z. B. Kita Sonnenschein">
    <label>Pädagogischer Ansatz</label>
    <select id="c-approach">
      <option value="">Bitte wählen</option>
      <option value="montessori">Montessori</option>
      <option value="reggio">Reggio-Pädagogik</option>
      <option value="waldorf">Waldorf</option>
      <option value="situationsansatz">Situationsansatz</option>
      <option value="offen">Offene Arbeit</option>
      <option value="sonstig">Anderer Ansatz</option>
    </select>
    <label>Philosophie & Leitbild (optional)</label>
    <textarea id="c-philosophy" placeholder="Leitbildtext, pädagogische Leitsätze..."></textarea>
    <label>Max. Anzahl Familien</label>
    <input type="number" id="c-max" value="50" min="1" max="1000">
    <button onclick="createKita()" id="c-btn">Profil erstellen</button>
    <div class="result" id="c-result"></div>
    <div class="code-box" id="c-codebox"></div>
  </div>

  <!-- MANAGE -->
  <div class="pane card" id="pane-manage">
    <label>Name der Einrichtung</label>
    <input type="text" id="m-name" placeholder="z. B. Kita Sonnenschein">
    <button class="secondary" onclick="loadStats()" id="m-load-btn">Status laden</button>
    <div class="result" id="m-result"></div>
    <div id="m-stats" style="display:none;margin-top:16px">
      <div class="stat-row"><span>Name</span><strong id="m-stat-name"></strong></div>
      <div class="stat-row"><span>Verbundene Geräte</span><strong id="m-stat-count"></strong></div>
      <div class="stat-row"><span>Limit</span><strong id="m-stat-max"></strong></div>
      <label>Limit ändern</label>
      <input type="number" id="m-new-max" min="1" max="1000">
      <button onclick="updateLimit()">Limit speichern</button>
      <button class="danger" onclick="resetGeraete()" style="margin-top:10px">Geräte zurücksetzen (Test)</button>
    </div>
  </div>
</div>

<script>
var WORKER = 'https://montessori-proxy.liam-broemer.workers.dev/kita-admin';
var PW = 'passt';
var currentName = null;

function api(body) {
  return fetch(WORKER, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-password': PW },
    body: JSON.stringify(body)
  }).then(function(r){ return r.json(); });
}

function switchTab(tab) {
  document.getElementById('tab-create').classList.toggle('active', tab === 'create');
  document.getElementById('tab-manage').classList.toggle('active', tab === 'manage');
  document.getElementById('pane-create').classList.toggle('active', tab === 'create');
  document.getElementById('pane-manage').classList.toggle('active', tab === 'manage');
}

function showResult(id, msg, ok) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'result ' + (ok ? 'ok' : 'err');
}

async function createKita() {
  var name = document.getElementById('c-name').value.trim();
  var approach = document.getElementById('c-approach').value;
  var philosophy = document.getElementById('c-philosophy').value.trim();
  var max_nutzer = parseInt(document.getElementById('c-max').value) || 50;
  if (!name) { showResult('c-result', 'Bitte einen Namen eingeben.', false); return; }
  var btn = document.getElementById('c-btn');
  btn.disabled = true; btn.textContent = 'Wird erstellt...';
  document.getElementById('c-codebox').style.display = 'none';
  try {
    var data = await api({ action: 'create', name, approach, philosophy, max_nutzer });
    if (!data.ok) throw new Error(data.error);
    showResult('c-result', '✓ Profil "' + name + '" erstellt. Limit: ' + max_nutzer + ' Familien.', true);
    var box = document.getElementById('c-codebox');
    box.style.display = 'block';
    box.innerHTML = '<div style="margin-bottom:8px"><strong>Eltern geben ein:</strong> ' + name + '</div>' +
      '<div style="font-size:12px;color:var(--brown2);margin-bottom:6px">Vorlage für die Kita:</div>' +
      '<div>Hallo, euer Montessori-Begleiter-Profil ist eingerichtet. Bitte gebt euren Eltern Bescheid: In der App unter "Ich bin Elternteil" einfach den Namen <strong>' + name + '</strong> eingeben und auf "Verbinden" tippen.</div>' +
      '<button class="copy-btn" onclick="navigator.clipboard.writeText(\'' + name.replace(/'/g,"\\'") + '\').then(function(){this.textContent=\'✓ Kopiert\';}.bind(this))">Namen kopieren</button>';
  } catch(e) {
    showResult('c-result', 'Fehler: ' + e.message, false);
  }
  btn.disabled = false; btn.textContent = 'Profil erstellen';
}

async function loadStats() {
  var name = document.getElementById('m-name').value.trim();
  if (!name) { showResult('m-result', 'Bitte einen Namen eingeben.', false); return; }
  var btn = document.getElementById('m-load-btn');
  btn.disabled = true; btn.textContent = 'Lädt...';
  document.getElementById('m-stats').style.display = 'none';
  try {
    var data = await api({ action: 'status', name });
    if (!data.ok) throw new Error(data.error);
    currentName = name;
    var p = data.profile;
    var geraete = Array.isArray(p.registrierte_geraete) ? p.registrierte_geraete : [];
    document.getElementById('m-stat-name').textContent = p.name;
    document.getElementById('m-stat-count').textContent = geraete.length;
    document.getElementById('m-stat-max').textContent = p.max_nutzer || 'kein Limit';
    document.getElementById('m-new-max').value = p.max_nutzer || 50;
    document.getElementById('m-stats').style.display = 'block';
    showResult('m-result', '✓ Profil geladen.', true);
  } catch(e) {
    showResult('m-result', 'Fehler: ' + e.message, false);
  }
  btn.disabled = false; btn.textContent = 'Status laden';
}

async function updateLimit() {
  if (!currentName) return;
  var max_nutzer = parseInt(document.getElementById('m-new-max').value);
  try {
    var data = await api({ action: 'update_limit', name: currentName, max_nutzer });
    if (!data.ok) throw new Error(data.error);
    document.getElementById('m-stat-max').textContent = max_nutzer;
    showResult('m-result', '✓ Limit auf ' + max_nutzer + ' gesetzt.', true);
  } catch(e) {
    showResult('m-result', 'Fehler: ' + e.message, false);
  }
}

async function resetGeraete() {
  if (!currentName) return;
  if (!confirm('Wirklich alle Geräte für "' + currentName + '" zurücksetzen?')) return;
  try {
    var data = await api({ action: 'reset', name: currentName });
    if (!data.ok) throw new Error(data.error);
    document.getElementById('m-stat-count').textContent = '0';
    showResult('m-result', '✓ Geräte zurückgesetzt.', true);
  } catch(e) {
    showResult('m-result', 'Fehler: ' + e.message, false);
  }
}
</script>
</body>
</html>
